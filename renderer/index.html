<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline'">
  <title>PenwinSafe</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    #toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
      -webkit-app-region: drag;
      min-height: 48px;
    }

    #toolbar button,
    #toolbar #address-bar {
      -webkit-app-region: no-drag;
    }

    .nav-btn {
      width: 32px;
      height: 32px;
      border: none;
      border-radius: 6px;
      background: #0f3460;
      color: #e0e0e0;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
      flex-shrink: 0;
    }

    .nav-btn:hover { background: #1a5276; }
    .nav-btn:disabled { opacity: 0.35; cursor: default; }

    #address-bar {
      flex: 1;
      height: 32px;
      padding: 0 12px;
      border: 1px solid #0f3460;
      border-radius: 16px;
      background: #0d1b2a;
      color: #e0e0e0;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }

    #address-bar:focus {
      border-color: #3498db;
    }

    #shield {
      font-size: 18px;
      flex-shrink: 0;
      title: 'Navegación segura activa';
    }

    #loading-bar {
      height: 2px;
      background: #3498db;
      width: 0%;
      transition: width 0.2s;
    }

    #loading-bar.active {
      animation: loading 1.5s ease-in-out infinite;
    }

    @keyframes loading {
      0%   { width: 0%; opacity: 1; }
      50%  { width: 70%; opacity: 1; }
      100% { width: 100%; opacity: 0; }
    }

    #webview-container {
      flex: 1;
      position: relative;
    }

    webview {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <div id="toolbar">
    <span id="shield" title="Navegación segura activa — CleanBrowsing Family Filter">🛡️</span>
    <button class="nav-btn" id="btn-back" title="Atrás">‹</button>
    <button class="nav-btn" id="btn-forward" title="Adelante">›</button>
    <button class="nav-btn" id="btn-reload" title="Recargar">↻</button>
    <input type="text" id="address-bar" placeholder="Introduce una dirección web..." spellcheck="false">
  </div>
  <div id="loading-bar"></div>
  <div id="webview-container">
    <webview id="wv" src="about:blank" allowpopups="false"></webview>
  </div>

  <script>
    const wv = document.getElementById('wv')
    const addressBar = document.getElementById('address-bar')
    const btnBack = document.getElementById('btn-back')
    const btnForward = document.getElementById('btn-forward')
    const btnReload = document.getElementById('btn-reload')
    const loadingBar = document.getElementById('loading-bar')

    const BLOCKED_SCHEMES = ['chrome:', 'chrome-extension:', 'devtools:']
    const HOME = 'https://www.google.com'

    function normalizeUrl(input) {
      input = input.trim()
      if (!input) return HOME
      if (/^https?:\/\//i.test(input)) return input
      if (/^[\w-]+\.[a-z]{2,}/i.test(input)) return 'https://' + input
      return `https://www.google.com/search?q=${encodeURIComponent(input)}`
    }

    function navigate(url) {
      const normalized = normalizeUrl(url)
      const scheme = normalized.split(':')[0] + ':'
      if (BLOCKED_SCHEMES.includes(scheme.toLowerCase())) return
      wv.src = normalized
    }

    addressBar.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') navigate(addressBar.value)
    })

    btnBack.addEventListener('click', () => wv.canGoBack() && wv.goBack())
    btnForward.addEventListener('click', () => wv.canGoForward() && wv.goForward())
    btnReload.addEventListener('click', () => wv.reload())

    wv.addEventListener('did-navigate', (e) => {
      addressBar.value = e.url
      btnBack.disabled = !wv.canGoBack()
      btnForward.disabled = !wv.canGoForward()
    })

    wv.addEventListener('did-navigate-in-page', (e) => {
      addressBar.value = e.url
    })

    wv.addEventListener('page-title-updated', (e) => {
      document.title = `${e.title} — PenwinSafe`
    })

    wv.addEventListener('did-start-loading', () => {
      loadingBar.classList.add('active')
    })

    wv.addEventListener('did-stop-loading', () => {
      loadingBar.classList.remove('active')
      loadingBar.style.width = '0%'
    })

    // Block any attempt to navigate to restricted pages
    wv.addEventListener('will-navigate', (e) => {
      const url = e.url || ''
      const scheme = url.split(':')[0].toLowerCase() + ':'
      if (BLOCKED_SCHEMES.includes(scheme)) {
        e.preventDefault()
      }
    })

    navigate(HOME)
  </script>
</body>
</html>
