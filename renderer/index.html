    // Live config loaded from Supabase (updated every 30s via heartbeat)
    let activeBlocklist = Object.values(BUILTIN).flat()  // flat list for fast matching
    let activeCategories = Object.keys(BUILTIN)          // which categories are enabled

    async function refreshBlocklist() {
      try {
        const cfg = await window.penwinsafe.getFilterConfig()
        // Always keep built-ins — only extend with server config
        const cats = cfg?.activeCategories?.length ? cfg.activeCategories : Object.keys(BUILTIN)
        const merged = {}
        for (const cat of cats) {
          merged[cat] = [...(BUILTIN[cat] || []), ...(cfg?.customWords?.[cat] || [])]
        }
        const newList = Object.values(merged).flat()
        // Never replace with empty list
        if (newList.length > 0) activeBlocklist = newList
      } catch {}
    }

    // Refresh every 30s to pick up panel changes
    setInterval(refreshBlocklist, 30000)

    function isBlockedQuery(query) {
      if (!query) return false
      const q = query.toLowerCase()
      return activeBlocklist.some(kw => q.includes(kw))
    }

    function extractSearchQuery(url) {
      try {
        const u = new URL(url)
        const h = u.hostname.replace('www.', '')
        if (h.startsWith('google.'))                       return u.searchParams.get('q')
        if (h === 'bing.com')                              return u.searchParams.get('q')
        if (h === 'duckduckgo.com')                        return u.searchParams.get('q')
        if (h === 'youtube.com')                           return u.searchParams.get('search_query') || u.searchParams.get('q')
        if (h === 'yahoo.com' || h.startsWith('yahoo.'))  return u.searchParams.get('p')
        if (h === 'ecosia.org')                            return u.searchParams.get('q')
        if (h === 'search.brave.com')                      return u.searchParams.get('q')
        if (h === 'qwant.com')                             return u.searchParams.get('q')
        if (h === 'startpage.com')                         return u.searchParams.get('q')
        if (h === 'ask.com')                               return u.searchParams.get('q')
        if (h.startsWith('yandex.'))                       return u.searchParams.get('text')
        if (h === 'baidu.com')                             return u.searchParams.get('wd') || u.searchParams.get('word')
        if (h === 'perplexity.ai')                         return u.searchParams.get('q')
        if (h === 'you.com')                               return u.searchParams.get('q')
      } catch {}
      return null
    }

    function isBlockedQuery(query) {
      if (!query) return false
      const q = query.toLowerCase()
      return activeBlocklist.some(kw => q.includes(kw))
    }

    function blockedPageURL(term, type) {
      const params = new URLSearchParams({ term: term || '', type: type || 'keyword' })
      return `blocked.html?${params.toString()}`
    }

    function domainBlockedURL(url) {
      let domain = url
      try { domain = new URL(url).hostname } catch {}
      return blockedPageURL(domain, 'dns')
    }

    let currentTitle = ''

    function initBrowser() {
      const wv = document.getElementById('wv')
      const addressBar = document.getElementById('address-bar')
      const btnBack = document.getElementById('btn-back')
      const btnForward = document.getElementById('btn-forward')
      const btnReload = document.getElementById('btn-reload')
      const loadingBar = document.getElementById('loading-bar')

      function navigate(url) {
        const normalized = normalizeUrl(url)
        const scheme = normalized.split(':')[0] + ':'
        if (BLOCKED_SCHEMES.includes(scheme.toLowerCase())) return
        const query = extractSearchQuery(normalized)
        if (isBlockedQuery(query)) {
          window.penwinsafe.logBlocked(normalized, 'keyword_filter', query)
          wv.src = blockedPageURL(query, 'keyword')
          return
        }
        wv.src = normalized
      }

      addressBar.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') navigate(addressBar.value)
      })

      btnBack.addEventListener('click', () => wv.canGoBack() && wv.goBack())
      btnForward.addEventListener('click', () => wv.canGoForward() && wv.goForward())
      btnReload.addEventListener('click', () => wv.reload())

      wv.addEventListener('did-navigate', (e) => {
        addressBar.value = e.url
        btnBack.disabled = !wv.canGoBack()
        btnForward.disabled = !wv.canGoForward()

        const query = extractSearchQuery(e.url)
        if (isBlockedQuery(query)) {
          window.penwinsafe.logBlocked(e.url, 'keyword_filter', query)
          wv.src = blockedPageURL(query, 'keyword')
          return
        }

        // Log search query
        if (query) window.penwinsafe.logSearch(query, e.url)

        // Log URL visit
        window.penwinsafe.logUrl(e.url, currentTitle)
      })

      wv.addEventListener('did-navigate-in-page', (e) => {
        addressBar.value = e.url
        const query = extractSearchQuery(e.url)
        if (isBlockedQuery(query)) {
          window.penwinsafe.logBlocked(e.url, 'keyword_filter', query)
          wv.src = blockedPageURL(query, 'keyword')
          return
        }
        if (query) window.penwinsafe.logSearch(query, e.url)
      })

      wv.addEventListener('page-title-updated', (e) => {
        currentTitle = e.title
        document.title = `${e.title} — PenwinSafe`
      })

      wv.addEventListener('did-start-loading', () => {
        loadingBar.classList.add('active')
      })

      wv.addEventListener('did-stop-loading', () => {
        loadingBar.classList.remove('active')
        loadingBar.style.width = '0%'
      })

      // DNS-blocked or unreachable sites → show custom blocked page
      wv.addEventListener('did-fail-load', (e) => {
        const { errorCode, validatedURL } = e
        // -3 = navigation aborted (normal), 0 = success, ignore those
        if (errorCode === -3 || errorCode === 0) return
        // -105 = ERR_NAME_NOT_RESOLVED (DNS block / NXDOMAIN)
        // -102 = ERR_CONNECTION_REFUSED, -101 = ERR_CONNECTION_RESET
        const dnsBlocked = [
          -105, // ERR_NAME_NOT_RESOLVED
          -106, // ERR_INTERNET_DISCONNECTED — skip, legit
          -21,  // ERR_NETWORK_ACCESS_DENIED
        ]
        if (errorCode === -105 || errorCode === -21) {
          window.penwinsafe.logBlocked(validatedURL, 'dns_filter', null)
          wv.src = domainBlockedURL(validatedURL)
        }
      })

      wv.addEventListener('will-navigate', (e) => {
        const scheme = (e.url || '').split(':')[0].toLowerCase() + ':'
        if (BLOCKED_SCHEMES.includes(scheme)) {
          e.preventDefault()
          return
        }
        const query = extractSearchQuery(e.url)
        if (isBlockedQuery(query)) {
          e.preventDefault()
          window.penwinsafe.logBlocked(e.url, 'keyword_filter', query)
          wv.src = blockedPageURL(query, 'keyword')
        }
      })

      navigate(HOME)
    }

    // ── Activation logic ────────────────────────────────────
    async function init() {
      const state = await window.penwinsafe.checkActivation()
      if (state.activated) {
        showBrowser()
        return
      }

      // Format code input as XXX-XXX automatically
      const codeInput = document.getElementById('code-input')
      codeInput.addEventListener('input', () => {
        let v = codeInput.value.replace(/[^a-zA-Z0-9]/g, '').toUpperCase().slice(0, 6)
        if (v.length > 3) v = v.slice(0, 3) + '-' + v.slice(3)
        codeInput.value = v
      })

      document.getElementById('btn-activate').addEventListener('click', doActivate)
      codeInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') doActivate() })
    }

    async function doActivate() {
      const code = document.getElementById('code-input').value.trim()
      const name = document.getElementById('name-input').value.trim()
      const btn = document.getElementById('btn-activate')
      const errEl = document.getElementById('activation-error')

      if (code.replace('-', '').length < 6) {
        showError('Introduce el código completo (XXX-XXX)')
        return
      }

      btn.disabled = true
      btn.innerHTML = '<span class="activation-spinner"></span>Verificando...'
      errEl.style.display = 'none'

      const result = await window.penwinsafe.activate(code, name)

      if (result.ok) {
        btn.innerHTML = '✓ Vinculado correctamente'
        btn.style.background = '#16a34a'
        setTimeout(showBrowser, 800)
      } else {
        showError(result.error || 'Error desconocido')
        btn.disabled = false
        btn.innerHTML = 'Vincular dispositivo'
      }
    }

    function showError(msg) {
      const el = document.getElementById('activation-error')
      el.textContent = msg
      el.style.display = 'block'
    }

    init()
  </script>
